name: Generate report

on:
  workflow_dispatch:
  schedule:
    - cron: "0 10 * * *" # daily at 10am UTC, before most of us start work

permissions:
  contents: write
  pages: write
  id-token: write

env:
  TURBOPUFFER_API_KEY: ${{ secrets.TURBOPUFFER_API_KEY }}

jobs:
  report:
    name: Generate report

    runs-on: blacksmith-32vcpu-ubuntu-2404

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Dump system information
        run: |
          lscpu

      - name: Check out code
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8

      - name: Check out tpuf repository
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
        with:
          repository: turbopuffer/turbopuffer
          path: turbopuffer
          token: ${{ secrets.GH_TOKEN }}

      - name: Set up Java
        uses: actions/setup-java@dded0888837ed1f317902acf8a20df0ad188d165
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@1780873c7b576612439a134613cc4cc74ce5538c

      - name: Launch turbopuffer
        run: |
          # Install OpenBLAS.
          sudo apt-get update
          sudo apt-get install -y libopenblas-dev

          # Make fake cache directory.
          sudo mkdir -p /mnt/disks/localssd/tpuf-staging-cache
          sudo chown $USER /mnt/disks/localssd/tpuf-staging-cache

          # Set up devbox-like environment.
          cd turbopuffer
          source devbox/env.sh
          # TODO: use a machine that supports the CPU features we use in
          # production.
          export RUSTFLAGS="-C target-cpu=native --cfg tokio_unstable"
          # Ensure we wait for reindex after full compaction to complete.
          sed -i 's/^\(wait_for_indexing_to_finish = \).*/\1true/' settings/default.toml

          # Build and run tpuf.
          cargo build --release --bin tpuf
          # Use ENV=benchmark instead of the default, which is "test".
          ENV=benchmark HOSTNAME=`hostname` cargo run --release --bin tpuf server &> tpuf.log &

          # Wait for tpuf to become available.
          # TODO: do this more robustly.
          sleep 1
          cat tpuf.log

      - name: Cache corpus
        id: cache-corpus
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: corpus.json
          key: corpus-with-filters

      - name: Download corpus
        if: steps.cache-corpus.outputs.cache-hit != 'true'
        run: make corpus

      - name: Compile engines
        run: make compile

      - name: Build indexes
        run: make index

      - name: Trigger full compaction
        run: |
          cd turbopuffer
          source devbox/env.sh

          # The `make index` step waits for the /metadata endpoint to stop
          # reporting unindexed bytes, but this occurs BEFORE the compaction
          # step of the index job is actually completed. We poll the logs to
          # wait for the actual index job to complete.
          # TODO: find a better way to do this?
          for i in $(seq 1 10); do
            grep -q "done incremental indexing" tpuf.log && break
            echo "waiting for compaction job from initial index to complete..."
            sleep 10
          done
          if ! grep -q "done incremental indexing" tpuf.log; then
            echo "WARNING: gave up waiting for compaction job from initial index after 10 iterations"
          fi

          # Trigger a full recompaction.
          # Only works with the test API key where the API key *is* the org ID.
          target/release/tpuf trigger-full-compaction $TURBOPUFFER_API_KEY search-benchmark-game

          # The above compaction is expected to fail due to a 30s timeout. Sigh.
          for i in $(seq 1 10); do
            [[ $(grep --count "done incremental indexing" tpuf.log) -ge 2 ]] && break
            echo "waiting for compaction job from reindex to complete..."
            sleep 10
          done
          if [[ $(grep --count "done incremental indexing" tpuf.log) -lt 2 ]]; then
            echo "WARNING: gave up waiting for compaction job from reindex after 10 iterations"
          fi

      - name: Run benchmarks
        run: make bench

      - name: Publish results
        run: make publish
        env:
          GIT_AUTHOR_NAME: turbobot
          GIT_AUTHOR_EMAIL: bot@turbopuffer.com
          GIT_COMMITTER_NAME: turbobot
          GIT_COMMITTER_EMAIL: bot@turbopuffer.com

      - name: Upload turbopuffer logs
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: always()
        with:
          name: tpuf.log
          path: turbopuffer/tpuf.log

      # v4.0.0+ pins its internal actions/upload-artifact to a full SHA, as
      # required by the org policy; v3.0.1 referenced it by an unpinned tag.
      - name: Upload GitHub Pages artifacts
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: build

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e
